services:
  sjtu-vpn-socks:
    build: .
    image: sjtu-vpn-socks:latest
    container_name: sjtu-vpn-socks
    restart: unless-stopped

    network_mode: bridge

    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    privileged: true

    sysctls:
      net.ipv6.conf.all.disable_ipv6: "1"
      net.ipv6.conf.default.disable_ipv6: "1"

    ports:
      - "127.0.0.1:${HOST_SOCKS_PORT:-1080}:1080/tcp"

    environment:
      JACCOUNT: "${JACCOUNT}"
      JPASSWORD: "${JPASSWORD}"
      VPN_SERVER: "${VPN_SERVER:-stuv4.vpn.sjtu.edu.cn}"
      VPN_RIGHTID: "${VPN_RIGHTID:-@stu.vpn.sjtu.edu.cn}"

      SOCKS_ADDR: "0.0.0.0"
      SOCKS_PORT: "1080"
